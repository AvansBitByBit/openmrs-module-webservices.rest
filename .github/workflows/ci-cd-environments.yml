name: CI/CD environments

on:
  push:
    branches:
      - dev
      - acceptance
      - devprodomgeving
      - master
  pull_request:
    branches:
      - dev
      - acceptance
      - master
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - Dev
          - Test
          - Prod

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    name: Environment policy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed environment files and local secrets
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '(^|/)(\.env($|[.])|.*secret.*|.*secrets.*)$'; then
            echo "Environment files or secret-like files must not be committed."
            echo "Use GitHub Environment variables and Environment secrets instead."
            exit 1
          fi

      - name: Validate production deployments only come from master
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

  build:
    name: Build and test
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Upload Maven test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-and-coverage-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/jacoco.exec
            **/target/site/jacoco/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Validate production artifact has no test resources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find . -path '*/target/*.omod' -type f)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No OMOD artifact found."
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            if unzip -l "$artifact" | grep -Ei 'src/test|testDataset|TestDataset|_testData|create_patient\.json|update_patient\.json'; then
              echo "Test fixture data found in deployable artifact: $artifact"
              exit 1
            fi
          done

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: "**/target/*.omod"
          if-no-files-found: error
          retention-days: 30

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'dev' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Dev')
        )
      }}
    environment:
      name: Dev
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Check dev environment configuration
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Dev deployment is gated and prepared; set DEPLOY_ENABLED=true to activate the deploy command."
            exit 0
          fi

          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Dev."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Dev."; exit 1; }

      - name: Deploy artifact to Dev
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy command for the Dev OpenMRS environment belongs here."

  live-api-tests:
    name: Live API and Postman tests
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'acceptance' ||
          github.ref_name == 'devprodomgeving' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Test')
        )
      }}
    environment:
      name: Test
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check live test configuration
        id: live_config
        shell: bash
        env:
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          OPENMRS_TEST_USERNAME: ${{ secrets.OPENMRS_TEST_USERNAME }}
          OPENMRS_TEST_PASSWORD: ${{ secrets.OPENMRS_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${OPENMRS_BASE_URL:-}" ] && [ -n "${OPENMRS_TEST_USERNAME:-}" ] && [ -n "${OPENMRS_TEST_PASSWORD:-}" ]; then
            echo "run_live=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_live=false" >> "$GITHUB_OUTPUT"
            echo "Live API tests skipped because OPENMRS_BASE_URL, OPENMRS_TEST_USERNAME, or OPENMRS_TEST_PASSWORD is missing in the Test environment."
          fi

      - name: Run Rest Assured live integration tests
        if: ${{ steps.live_config.outputs.run_live == 'true' }}
        shell: bash
        env:
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          OPENMRS_TEST_USERNAME: ${{ secrets.OPENMRS_TEST_USERNAME }}
          OPENMRS_TEST_PASSWORD: ${{ secrets.OPENMRS_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress -pl integration-tests -Pintegration-tests verify \
            -DtestBaseUrl="${OPENMRS_BASE_URL}" \
            -DtestUsername="${OPENMRS_TEST_USERNAME}" \
            -DtestPassword="${OPENMRS_TEST_PASSWORD}"

      - name: Run Postman collection with Newman
        if: ${{ steps.live_config.outputs.run_live == 'true' }}
        shell: bash
        env:
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          OPENMRS_TEST_USERNAME: ${{ secrets.OPENMRS_TEST_USERNAME }}
          OPENMRS_TEST_PASSWORD: ${{ secrets.OPENMRS_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p target/newman
          npx --yes newman@6 run postman/webservices-rest.postman_collection.json \
            --env-var "baseUrl=${OPENMRS_BASE_URL}" \
            --env-var "username=${OPENMRS_TEST_USERNAME}" \
            --env-var "password=${OPENMRS_TEST_PASSWORD}" \
            --reporters cli,junit \
            --reporter-junit-export target/newman/webservices-rest-postman.xml

      - name: Upload live API and Postman reports
        if: ${{ always() && steps.live_config.outputs.run_live == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: live-api-and-postman-reports
          path: |
            integration-tests/target/failsafe-reports/**
            target/newman/**
          if-no-files-found: ignore
          retention-days: 30

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs:
      - build
      - live-api-tests
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'acceptance' ||
          github.ref_name == 'devprodomgeving' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Test')
        )
      }}
    environment:
      name: Test
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Check test environment configuration
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Test deployment is gated and prepared; set DEPLOY_ENABLED=true to activate the deploy command."
            exit 0
          fi

          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Test."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Test."; exit 1; }

      - name: Deploy artifact to Test
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy command for the Test OpenMRS environment belongs here."

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'master' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod')
        )
      }}
    environment:
      name: Prod
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Enforce production branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Check production environment configuration
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Production deployment is gated and prepared; set DEPLOY_ENABLED=true after the production deploy command is connected."
            exit 0
          fi

          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Prod."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Prod."; exit 1; }

      - name: Deploy artifact to Prod
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy command for the production OpenMRS environment belongs here."
