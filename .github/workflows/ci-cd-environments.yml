name: CI/CD environments

on:
  push:
    branches:
      - dev
      - acceptance
      - devprodomgeving
      - master
  pull_request:
    branches:
      - dev
      - acceptance
      - master
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - Dev
          - Test
          - Prod
      run_compose_smoke_test:
        description: Build and start the Dev Docker Compose stack in CI
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    name: Environment policy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed environment files and local secrets
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '(^|/)(\.env($|[.])|.*secret.*|.*secrets.*)$'; then
            echo "Environment files or secret-like files must not be committed."
            echo "Use GitHub Environment variables and Environment secrets instead."
            exit 1
          fi

      - name: Validate production deployments only come from master
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

  build:
    name: Build and test module
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Validate production artifact has no test resources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find . -path '*/target/*.omod' -type f)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No OMOD artifact found."
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            if unzip -l "$artifact" | grep -Ei 'src/test|testDataset|TestDataset|_testData|create_patient\.json|update_patient\.json'; then
              echo "Test fixture data found in deployable artifact: $artifact"
              exit 1
            fi
          done

      - name: Upload deployable module artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: "**/target/*.omod"
          if-no-files-found: error
          retention-days: 30

  compose-validation:
    name: Validate OTAP Docker Compose
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Dev compose
        run: docker compose -f docker-compose.dev.yml config

      - name: Validate Test compose
        run: docker compose -f docker-compose.test.yml config

      - name: Validate Prod compose
        env:
          OMRS_DB_PASSWORD: ci-placeholder
          MYSQL_ROOT_PASSWORD: ci-placeholder-root
        run: docker compose -f docker-compose.prod.yml config

  compose-smoke-test:
    name: Optional Dev Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - build
      - compose-validation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_compose_smoke_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local REST module OMOD
        run: docker compose -f docker-compose.dev.yml --profile build-module run --rm module-builder

      - name: Start Dev stack
        run: docker compose -f docker-compose.dev.yml up --build -d

      - name: Wait for OpenMRS REST endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..80}; do
            if curl -fsS http://localhost:8080/openmrs/ws/rest/v1/session >/tmp/openmrs-session.json; then
              cat /tmp/openmrs-session.json
              exit 0
            fi
            docker compose -f docker-compose.dev.yml ps
            sleep 15
          done
          docker compose -f docker-compose.dev.yml logs --no-color
          exit 1

      - name: Stop Dev stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'dev' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Dev')
        )
      }}
    environment:
      name: Dev
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Dev deployment gate passed. Set DEPLOY_ENABLED=true and implement the deploy command to deploy to a server."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Dev."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Dev."; exit 1; }
          echo "Deploy command for Dev belongs here."

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'acceptance' ||
          github.ref_name == 'devprodomgeving' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Test')
        )
      }}
    environment:
      name: Test
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Test deployment gate passed. Set DEPLOY_ENABLED=true and implement the deploy command to deploy to a server."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Test."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Test."; exit 1; }
          echo "Deploy command for Test belongs here."

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'master' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod')
        )
      }}
    environment:
      name: Prod
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Enforce production branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Prod deployment gate passed. Set DEPLOY_ENABLED=true after the production deploy command is connected."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Prod."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Prod."; exit 1; }
          echo "Deploy command for Prod belongs here."
