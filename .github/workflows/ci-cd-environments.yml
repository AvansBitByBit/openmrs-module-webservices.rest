name: CI/CD environments

on:
  push:
    branches:
      - dev
      - acceptance
      - devprodomgeving
      - master
  pull_request:
    branches:
      - dev
      - acceptance
      - master
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - Dev
          - Test
          - Prod
      run_compose_smoke_test:
        description: Build and start the Dev Docker Compose stack in CI
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    name: Environment policy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed environment files and local secrets
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '(^|/)(\.env($|[.])|.*secret.*|.*secrets.*)$'; then
            echo "Environment files or secret-like files must not be committed."
            echo "Use GitHub Environment variables and Environment secrets instead."
            exit 1
          fi

      - name: Validate production deployments only come from master
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

  build:
    name: Build and test module
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Generate JaCoCo coverage reports
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage
          path: |
            **/target/jacoco.exec
            **/target/site/jacoco/**
          if-no-files-found: warn
          retention-days: 30

      - name: Validate production artifact has no test resources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find . -path '*/target/*.omod' -type f)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No OMOD artifact found."
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            if unzip -l "$artifact" | grep -Ei 'src/test|testDataset|TestDataset|_testData|create_patient\.json|update_patient\.json'; then
              echo "Test fixture data found in deployable artifact: $artifact"
              exit 1
            fi
          done

      - name: Upload deployable module artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: "**/target/*.omod"
          if-no-files-found: error
          retention-days: 30

  compose-validation:
    name: Validate OTAP Docker Compose
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Dev compose
        run: docker compose -f docker-compose.dev.yml config

      - name: Validate Test compose
        run: docker compose -f docker-compose.test.yml config

      - name: Validate Prod compose
        env:
          OMRS_DB_PASSWORD: ci-placeholder
          MYSQL_ROOT_PASSWORD: ci-placeholder-root
        run: docker compose -f docker-compose.prod.yml config

  security-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    env:
      TRIVY_CACHE_DIR: .trivycache
      TRIVY_NO_PROGRESS: "true"
      TRIVY_SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan repository filesystem
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/trivy
          trivy fs \
            --scanners vuln,secret,misconfig \
            --severity "$TRIVY_SEVERITY" \
            --skip-dirs .git \
            --skip-dirs docs/auditrapport/evidence \
            --format table \
            --output reports/trivy/repository-table.txt \
            .
          trivy fs \
            --scanners vuln,secret,misconfig \
            --severity "$TRIVY_SEVERITY" \
            --skip-dirs .git \
            --skip-dirs docs/auditrapport/evidence \
            --format json \
            --output reports/trivy/repository.json \
            .

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Build backend overlay image for scanning
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docker/modules
          omod_file="$(find dist -name '*.omod' -type f | head -n 1)"
          if [ -z "$omod_file" ]; then
            echo "No downloaded OMOD artifact found for backend image scan."
            exit 1
          fi
          cp "$omod_file" docker/modules/
          docker build -t openmrs-webservices-rest-backend:ci -f docker/backend/Dockerfile .

      - name: Scan runtime container images
        shell: bash
        run: |
          set -euo pipefail
          images=(
            "backend-overlay|openmrs-webservices-rest-backend:ci"
            "frontend|openmrs/openmrs-reference-application-3-frontend:3.6.0"
            "gateway|openmrs/openmrs-reference-application-3-gateway:3.6.0"
            "database|mariadb:10.11.7"
          )

          for entry in "${images[@]}"; do
            name="${entry%%|*}"
            image="${entry#*|}"
            trivy image \
              --severity "$TRIVY_SEVERITY" \
              --format table \
              --output "reports/trivy/image-${name}-table.txt" \
              "$image"
            trivy image \
              --severity "$TRIVY_SEVERITY" \
              --format json \
              --output "reports/trivy/image-${name}.json" \
              "$image"
          done

      - name: Create Trivy report summary
        shell: bash
        run: |
          set -euo pipefail
          summary="reports/trivy/README.md"
          {
            echo "# Trivy CI report"
            echo
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "This job is report-only: vulnerabilities are recorded in artifacts, but do not fail CI."
            echo
            echo "| Report | Target | Critical | High | Medium | Low | Unknown | Misconfigs | Secrets |"
            echo "| --- | --- | ---: | ---: | ---: | ---: | ---: | ---: | ---: |"
          } > "$summary"

          for json in reports/trivy/*.json; do
            report="$(basename "$json" .json)"
            target="$(jq -r '.ArtifactName // "repository"' "$json")"
            critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "$json")"
            high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "$json")"
            medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' "$json")"
            low="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "LOW")] | length' "$json")"
            unknown="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "UNKNOWN")] | length' "$json")"
            misconfigs="$(jq '[.Results[]?.Misconfigurations[]?] | length' "$json")"
            secrets="$(jq '[.Results[]?.Secrets[]?] | length' "$json")"
            echo "| ${report} | ${target} | ${critical} | ${high} | ${medium} | ${low} | ${unknown} | ${misconfigs} | ${secrets} |" >> "$summary"
          done

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-reports
          path: reports/trivy/**
          if-no-files-found: error
          retention-days: 30

  compose-smoke-test:
    name: Optional Dev Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - build
      - compose-validation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_compose_smoke_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local REST module OMOD
        run: docker compose -f docker-compose.dev.yml --profile build-module run --rm module-builder

      - name: Start Dev stack
        run: docker compose -f docker-compose.dev.yml up --build -d

      - name: Wait for OpenMRS REST endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..80}; do
            if curl -fsS http://localhost:8080/openmrs/ws/rest/v1/session >/tmp/openmrs-session.json; then
              cat /tmp/openmrs-session.json
              exit 0
            fi
            docker compose -f docker-compose.dev.yml ps
            sleep 15
          done
          docker compose -f docker-compose.dev.yml logs --no-color
          exit 1

      - name: Stop Dev stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'dev' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Dev')
        )
      }}
    environment:
      name: Dev
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Dev deployment gate passed. Set DEPLOY_ENABLED=true and implement the deploy command to deploy to a server."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Dev."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Dev."; exit 1; }
          echo "Deploy command for Dev belongs here."

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'acceptance' ||
          github.ref_name == 'devprodomgeving' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Test')
        )
      }}
    environment:
      name: Test
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Test deployment gate passed. Set DEPLOY_ENABLED=true and implement the deploy command to deploy to a server."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Test."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Test."; exit 1; }
          echo "Deploy command for Test belongs here."

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs:
      - build
      - compose-validation
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (
          github.ref_name == 'master' ||
          (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'Prod')
        )
      }}
    environment:
      name: Prod
      url: ${{ vars.OPENMRS_BASE_URL }}
    steps:
      - name: Enforce production branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Production deployments are only allowed from master."
            exit 1
          fi

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: dist

      - name: Deployment placeholder
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          OPENMRS_BASE_URL: ${{ vars.OPENMRS_BASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENABLED:-false}" != "true" ]; then
            echo "Prod deployment gate passed. Set DEPLOY_ENABLED=true after the production deploy command is connected."
            exit 0
          fi
          test -n "${OPENMRS_BASE_URL:-}" || { echo "OPENMRS_BASE_URL is missing for Prod."; exit 1; }
          test -n "${DEPLOY_TOKEN:-}" || { echo "DEPLOY_TOKEN is missing for Prod."; exit 1; }
          echo "Deploy command for Prod belongs here."
