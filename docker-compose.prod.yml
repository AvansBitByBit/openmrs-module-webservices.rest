services:
  module-builder:
    image: maven:3.9.9-eclipse-temurin-8
    working_dir: /workspace
    command: >
      sh -c "mvn --batch-mode --no-transfer-progress clean verify
      && mkdir -p docker/modules
      && cp omod/target/*.omod docker/modules/"
    volumes:
      - .:/workspace
      - maven-cache-prod:/root/.m2

  db:
    image: mariadb:10.11.7
    command: "mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    environment:
      MARIADB_DATABASE: ${OMRS_DB_NAME:-openmrs_prod}
      MARIADB_USER: ${OMRS_DB_USERNAME:-openmrs}
      MARIADB_PASSWORD: ${OMRS_DB_PASSWORD:?Set OMRS_DB_PASSWORD before starting prod}
      MARIADB_ROOT_PASSWORD: ${OMRS_DB_ROOT_PASSWORD:?Set OMRS_DB_ROOT_PASSWORD before starting prod}
    healthcheck:
      test: "mariadb --user=$${MARIADB_USER} --password=$${MARIADB_PASSWORD} --execute \"SHOW DATABASES;\""
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - openmrs-db-prod:/var/lib/mysql

  openmrs:
    image: openmrs/openmrs-core:2.8.6
    depends_on:
      module-builder:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "${OPENMRS_HTTP_PORT:-8080}:8080"
    environment:
      OMRS_DB: mariadb
      OMRS_DB_HOSTNAME: db
      OMRS_DB_NAME: ${OMRS_DB_NAME:-openmrs_prod}
      OMRS_DB_USERNAME: ${OMRS_DB_USERNAME:-openmrs}
      OMRS_DB_PASSWORD: ${OMRS_DB_PASSWORD:?Set OMRS_DB_PASSWORD before starting prod}
      OMRS_ADMIN_USER_PASSWORD: ${OMRS_ADMIN_USER_PASSWORD:?Set OMRS_ADMIN_USER_PASSWORD before starting prod}
      OMRS_ADMIN_PASSWORD_LOCKED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    volumes:
      - openmrs-data-prod:/openmrs/data
      - ./docker/modules:/openmrs/data/modules:ro
    restart: unless-stopped

volumes:
  maven-cache-prod:
  openmrs-db-prod:
  openmrs-data-prod:
